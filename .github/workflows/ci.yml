name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.12"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install meshtastic from local
        run: |
          python -m pip install --upgrade pip
          pip3 install poetry
          poetry install
          poetry run meshtastic --version

  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v4
      - name: Install Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Uninstall meshtastic
        run: |
          pip3 uninstall -y meshtastic
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip3 install poetry
      - name: Install meshtastic from local
        run: |
          poetry install --all-extras --with dev,powermon
          poetry run meshtastic --version
      - name: Run lint, type check, and tests in parallel
        run: make -j3 --output-sync=target ci
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          env_vars: OS, PYTHON
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          verbose: true

  simradio_testing:
    needs: [validate, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel:
          - beta
          - alpha
          - daily
    continue-on-error: ${{ matrix.channel == 'daily' }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install meshtastic from local
        run: |
          python -m pip install --upgrade pip
          pip3 install poetry
          poetry install --all-extras --with dev
          poetry run meshtastic --version
      - name: Install meshtasticd (${{ matrix.channel }}) from PPA
        run: |
          sudo add-apt-repository -y ppa:meshtastic/${{ matrix.channel }}
          sudo apt-get update
          sudo apt-get install -y meshtasticd
      - name: Run firmware smoke tests
        run: poetry run pytest -m "smokevirt or smokemesh" -v
        timeout-minutes: 15
